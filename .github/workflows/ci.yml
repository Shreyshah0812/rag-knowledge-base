name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/unit -v

  integration-and-eval:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag_kb
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
    env:
      DATABASE_URL: postgresql://rag:rag@localhost:5432/rag_kb
      QDRANT_URL: http://localhost:6333
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      RAW_FILE_STORAGE_DIR: ./uploads_data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Apply DB schema
        run: psql "$DATABASE_URL" -f scripts/init_db.sql
      - name: Start API, run integration tests, and run eval
        run: |
          PYTHONPATH=. nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
          API_PID=$!

          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API is up"
              break
            fi
            echo "Waiting for API... ($i)"
            sleep 2
          done
          echo "----- uvicorn.log (startup) -----"
          cat uvicorn.log

          pytest tests/integration -v
          INTEGRATION_EXIT=$?

          python -m app.eval.run_eval --api-url http://localhost:8000
          EVAL_EXIT=$?

          echo "----- uvicorn.log (full) -----"
          cat uvicorn.log

          kill "$API_PID" 2>/dev/null || true

          if [ "$INTEGRATION_EXIT" -ne 0 ]; then
            echo "Integration tests failed."
            exit 1
          fi
          if [ "$EVAL_EXIT" -ne 0 ]; then
            echo "Eval run failed."
            exit 1
          fi
      - name: Enforce quality gate
        run: |
          python - <<'EOF'
          import json, glob, sys
          latest = sorted(glob.glob("eval_results/*.json"))[-1]
          with open(latest) as f:
              summary = json.load(f)
          MIN_RECALL = 0.7
          MIN_DECLINE_ACCURACY = 0.8
          failed = []
          if summary["avg_recall_at_5"] < MIN_RECALL:
              failed.append(f"Recall@5 {summary['avg_recall_at_5']:.2f} < {MIN_RECALL}")
          if summary["decline_accuracy"] < MIN_DECLINE_ACCURACY:
              failed.append(f"Decline accuracy {summary['decline_accuracy']:.2f} < {MIN_DECLINE_ACCURACY}")
          if failed:
              print("EVAL GATE FAILED:\n" + "\n".join(failed))
              sys.exit(1)
          print("Eval gate passed.")
          EOF
      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results/